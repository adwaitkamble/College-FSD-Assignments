<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – DriveDeals</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand"><span class="brand-icon">🚗</span><span>Drive<strong>Deals</strong></span></a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join thousands of buyers &amp; sellers</p>
      </div>
      <form class="auth-form" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" class="form-input" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="regPhone" class="form-input" placeholder="+91 9876543210" />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="regLocation" class="form-input" placeholder="e.g. Mumbai, Maharashtra" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-error" id="regError"></div>
        <button type="submit" class="btn btn-primary btn-full" id="regSubmit">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/login.html">Login here</a></p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('regError');
      const btn = document.getElementById('regSubmit');
      errorEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await apiPost('/api/auth/register', {
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          phone: document.getElementById('regPhone').value,
          location: document.getElementById('regLocation').value,
        });
        localStorage.setItem('token', res.token);
        localStorage.setItem('user', JSON.stringify(res.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Registration failed. Please try again.';
      } finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
